server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # PWA — aggressive caching for hashed assets, no cache for HTML
    location ~* \.(js|css|png|jpeg|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy to backend on Railway - MUST come before catch-all /
    location /api/ {
        proxy_pass https://servicemonks-erp-production.up.railway.app/api/;
        proxy_ssl_verify off;
        add_header X-Nginx-Config "2026-06-19-debugging-https-proxy" always;

        # Forward headers to backend
        proxy_set_header Host servicemonks-erp-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Authorization $http_authorization;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Response handling
        proxy_buffering off;

        # Security headers for response
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /uploads/ {
        proxy_pass https://servicemonks-erp-production.up.railway.app/uploads/;
        proxy_ssl_verify off;
        proxy_set_header Host servicemonks-erp-production.up.railway.app;
    }

    # SPA fallback - must come LAST
    location / {
        try_files $uri $uri/ /index.html;
    }
}
