server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # PWA — aggressive caching for hashed assets, no cache for HTML
    location ~* \.(js|css|png|jpeg|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend on Railway
    location /api/ {
        proxy_pass https://servicemonks-erp-production.up.railway.app/api/;
        proxy_ssl_verify off;
        proxy_set_header Host servicemonks-erp-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location /uploads/ {
        proxy_pass https://servicemonks-erp-production.up.railway.app/uploads/;
        proxy_ssl_verify off;
        proxy_set_header Host servicemonks-erp-production.up.railway.app;
    }
}
